<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VUMC Watch</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .player-shell {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
    }

    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
      display: block;
      background: #000;
    }

    .top-fade {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 160px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.78), rgba(0,0,0,0));
      pointer-events: none;
    }

    .bottom-fade {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 240px;
      background: linear-gradient(to top, rgba(0,0,0,0.88), rgba(0,0,0,0));
      pointer-events: none;
    }

    .overlay {
      position: absolute;
      left: 36px;
      right: 36px;
      bottom: 28px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 24px;
      pointer-events: none;
      z-index: 3;
    }

    .meta-block {
      max-width: 70%;
    }

    .eyebrow {
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.72);
      margin-bottom: 10px;
    }

    .video-title {
      font-size: 40px;
      line-height: 1.08;
      font-weight: 800;
      letter-spacing: -0.8px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.55);
    }

    .back-box {
      font-size: 18px;
      color: rgba(255,255,255,0.92);
      background: rgba(0,0,0,0.42);
      border: 1px solid rgba(255,255,255,0.14);
      padding: 10px 14px;
      white-space: nowrap;
    }

    .error-screen {
      width: 100%;
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.9)),
        #000;
    }

    .error-screen.active {
      display: flex;
    }

    .error-content {
      max-width: 900px;
    }

    .error-content .eyebrow {
      margin-bottom: 14px;
    }

    .error-content h1 {
      margin: 0 0 12px;
      font-size: 60px;
      line-height: 1.02;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .error-content p {
      font-size: 24px;
      line-height: 1.45;
      color: rgba(255,255,255,0.84);
      margin: 0 0 14px;
    }

    @media (max-width: 900px) {
      .overlay {
        left: 18px;
        right: 18px;
        bottom: 18px;
        flex-direction: column;
        align-items: flex-start;
      }

      .meta-block {
        max-width: 100%;
      }

      .video-title {
        font-size: 28px;
      }

      .back-box {
        font-size: 16px;
      }

      .error-content h1 {
        font-size: 40px;
      }

      .error-content p {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div id="playerShell" class="player-shell">
    <iframe
      id="player"
      src=""
      allow="autoplay; encrypted-media; picture-in-picture"
      allowfullscreen
      title="VUMC Video Player">
    </iframe>

    <div class="top-fade"></div>
    <div class="bottom-fade"></div>

    <div class="overlay">
      <div class="meta-block">
        <div class="eyebrow">Now Playing</div>
        <div id="videoTitle" class="video-title">Loading video...</div>
      </div>
      <div class="back-box">Press BACK to return</div>
    </div>
  </div>

  <div id="errorScreen" class="error-screen">
    <div class="error-content">
      <div class="eyebrow">Versailles United Methodist Church</div>
      <h1>Video Not Available</h1>
      <p>This video could not be loaded.</p>
      <p>Press BACK on your Roku remote to return.</p>
    </div>
  </div>

  <script>
    function getParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    const videoId = getParam("v");
    const title = getParam("title");

    const playerShell = document.getElementById("playerShell");
    const player = document.getElementById("player");
    const videoTitle = document.getElementById("videoTitle");
    const errorScreen = document.getElementById("errorScreen");

    if (!videoId) {
      playerShell.style.display = "none";
      errorScreen.classList.add("active");
    } else {
      player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0&rel=0&playsinline=1`;
      videoTitle.textContent = title ? decodeURIComponent(title) : "Now Playing";
    }
  </script>
</body>
</html>
