<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VUMC Watch</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .wrap {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
    }

    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
      display: block;
      background: #000;
    }

    .overlay {
      position: absolute;
      left: 20px;
      right: 20px;
      bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 20px;
      pointer-events: none;
    }

    .title-box,
    .back-box {
      background: rgba(0, 0, 0, 0.55);
      border-radius: 12px;
      padding: 10px 14px;
    }

    .title-box {
      max-width: 70%;
    }

    .video-title {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.25;
    }

    .back-box {
      font-size: 18px;
      white-space: nowrap;
    }

    .error-screen {
      width: 100%;
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }

    .error-screen.active {
      display: flex;
    }

    .error-content {
      max-width: 800px;
    }

    .error-content h1 {
      font-size: 54px;
      margin: 0 0 12px;
    }

    .error-content p {
      font-size: 24px;
      line-height: 1.5;
      color: rgba(255,255,255,0.85);
      margin: 0 0 16px;
    }
  </style>
</head>
<body>
  <div class="wrap" id="playerWrap">
    <iframe
      id="player"
      src=""
      allow="autoplay; encrypted-media; picture-in-picture"
      allowfullscreen
      title="VUMC Video Player">
    </iframe>

    <div class="overlay">
      <div class="title-box">
        <div id="videoTitle" class="video-title">Loading video...</div>
      </div>
      <div class="back-box">Press BACK to return</div>
    </div>
  </div>

  <div id="errorScreen" class="error-screen">
    <div class="error-content">
      <h1>Video Not Available</h1>
      <p>This video could not be loaded.</p>
      <p>Press BACK on your Roku remote to return.</p>
    </div>
  </div>

  <script>
    function getParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    const videoId = getParam("v");
    const title = getParam("title");

    const player = document.getElementById("player");
    const videoTitle = document.getElementById("videoTitle");
    const playerWrap = document.getElementById("playerWrap");
    const errorScreen = document.getElementById("errorScreen");

    if (!videoId) {
      playerWrap.style.display = "none";
      errorScreen.classList.add("active");
    } else {
      player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0&rel=0&playsinline=1`;
      videoTitle.textContent = title ? decodeURIComponent(title) : "Now Playing";
    }
  </script>
</body>
</html>
