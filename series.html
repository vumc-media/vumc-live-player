<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>In The Wilderness | VUMC</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.72) 24%, #000 52%),
        #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      width: 100%;
      min-height: 100vh;
    }

    .hero {
      padding: 42px 42px 20px;
    }

    .eyebrow {
      font-size: 15px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.72);
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 72px;
      line-height: 0.95;
      font-weight: 800;
      letter-spacing: -1.5px;
    }

    .subtext {
      max-width: 980px;
      font-size: 25px;
      line-height: 1.4;
      color: rgba(255,255,255,0.84);
      margin-bottom: 18px;
    }

    .status-box {
      display: inline-block;
      font-size: 18px;
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 10px 14px;
    }

    .section {
      padding: 8px 42px 36px;
    }

    .section-title {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 16px;
      color: rgba(255,255,255,0.96);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
    }

    .card {
      display: block;
      text-decoration: none;
      color: #fff;
      background: #111;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .card:hover,
    .card:focus {
      transform: scale(1.04);
      border-color: rgba(255,255,255,0.35);
      box-shadow: 0 12px 28px rgba(0,0,0,0.45);
    }

    .thumb-wrap {
      position: relative;
      aspect-ratio: 16 / 9;
      background: #000;
      overflow: hidden;
    }

    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: #d60000;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 10px;
      letter-spacing: 0.5px;
    }

    .card-content {
      padding: 10px 10px 12px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      min-height: 92px;
    }

    .card-title {
      font-size: 17px;
      line-height: 1.28;
      font-weight: 700;
      margin-bottom: 7px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      font-size: 14px;
      color: rgba(255,255,255,0.72);
      line-height: 1.3;
    }

    .note {
      padding: 0 42px 34px;
      font-size: 16px;
      color: rgba(255,255,255,0.62);
    }

    @media (max-width: 1400px) {
      .grid { grid-template-columns: repeat(4, 1fr); }
    }

    @media (max-width: 1100px) {
      h1 { font-size: 54px; }
      .subtext { font-size: 21px; }
      .grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 800px) {
      .hero, .section, .note { padding-left: 18px; padding-right: 18px; }
      h1 { font-size: 40px; }
      .subtext { font-size: 18px; }
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div class="eyebrow">Current Series</div>
      <h1>In The Wilderness</h1>
      <div class="subtext">A sermon series about faith, testing, and trusting God in uncertain seasons.</div>
      <div id="statusBox" class="status-box">Loading series...</div>
    </div>

    <div class="section">
      <div class="section-title">Browse Messages</div>
      <div id="grid" class="grid"></div>
    </div>

    <div class="note">Select a message to watch. Press BACK on your Roku remote to return.</div>
  </div>

  <script>
    const API_KEY = "AIzaSyCxjuHkcGO-pr1lRIEK8AUOt6RkJKQjpEA";
    const PLAYLIST_ID = "PLD_PrR9HqVpnOz0YXlyRin76oa6FeDVfM";
    const MAX_RESULTS = 24;
    const WATCH_PAGE = "watch.html";

    const grid = document.getElementById("grid");
    const statusBox = document.getElementById("statusBox");

    async function fetchJson(url) {
      const response = await fetch(url);
      if (!response.ok) throw new Error("API request failed");
      return await response.json();
    }

    async function fetchPlaylistItems() {
      const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&maxResults=${MAX_RESULTS}&playlistId=${PLAYLIST_ID}&key=${API_KEY}`;
      return await fetchJson(url);
    }

    async function fetchVideoDetails(videoIds) {
      const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,liveStreamingDetails,status&id=${videoIds.join(",")}&key=${API_KEY}`;
      return await fetchJson(url);
    }

    function getThumb(snippet) {
      return (
        snippet?.thumbnails?.maxres?.url ||
        snippet?.thumbnails?.standard?.url ||
        snippet?.thumbnails?.high?.url ||
        snippet?.thumbnails?.medium?.url ||
        snippet?.thumbnails?.default?.url ||
        ""
      );
    }

    function formatDate(dateString) {
      if (!dateString) return "";
      const date = new Date(dateString);
      return date.toLocaleDateString("en-US", {
        month: "short",
        day: "numeric",
        year: "numeric"
      });
    }

    function formatEastern(dateString) {
      if (!dateString) return "";
      const d = new Date(dateString);
      return d.toLocaleString("en-US", {
        timeZone: "America/New_York",
        weekday: "short",
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      }) + " ET";
    }

    function getBadge(video) {
      const state = video?.snippet?.liveBroadcastContent;
      if (state === "live") return "LIVE";
      if (state === "upcoming") return "UPCOMING";
      return "";
    }

    function getMeta(video) {
      const state = video?.snippet?.liveBroadcastContent;
      if (state === "live") return "Streaming now";
      if (state === "upcoming") {
        const start = video?.liveStreamingDetails?.scheduledStartTime;
        return start ? `Streaming ${formatEastern(start)}` : "Upcoming livestream";
      }
      return formatDate(video?.snippet?.publishedAt) || "Message";
    }

    function sortVideos(videos) {
      return videos.sort((a, b) => {
        const rank = (video) => {
          const state = video?.snippet?.liveBroadcastContent;
          if (state === "live") return 0;
          if (state === "upcoming") return 1;
          return 2;
        };

        const rankDiff = rank(a) - rank(b);
        if (rankDiff !== 0) return rankDiff;

        const aDate = a?.liveStreamingDetails?.scheduledStartTime || a?.snippet?.publishedAt || "";
        const bDate = b?.liveStreamingDetails?.scheduledStartTime || b?.snippet?.publishedAt || "";

        return new Date(bDate) - new Date(aDate);
      });
    }

    function buildCard(video) {
      const videoId = video.id;
      const title = video.snippet.title;
      const thumb = getThumb(video.snippet);
      const badge = getBadge(video);
      const meta = getMeta(video);

      const link = document.createElement("a");
      link.className = "card";
      link.href = `${WATCH_PAGE}?v=${encodeURIComponent(videoId)}&title=${encodeURIComponent(title)}`;

      link.innerHTML = `
        <div class="thumb-wrap">
          <img src="${thumb}" alt="${title}">
          ${badge ? `<div class="badge">${badge}</div>` : ""}
        </div>
        <div class="card-content">
          <div class="card-title">${title}</div>
          <div class="card-meta">${meta}</div>
        </div>
      `;

      return link;
    }

    async function loadSeries() {
      try {
        const playlistData = await fetchPlaylistItems();
        const items = playlistData.items || [];

        if (!items.length) {
          statusBox.textContent = "No messages found in this series playlist.";
          return;
        }

        const ids = items.map(item => item?.contentDetails?.videoId).filter(Boolean);
        const videoData = await fetchVideoDetails(ids);
        const videos = sortVideos(videoData.items || []);

        grid.innerHTML = "";
        videos.forEach(video => grid.appendChild(buildCard(video)));

        statusBox.textContent = "Choose a message to watch.";
      } catch (error) {
        statusBox.textContent = "Unable to load this series right now. Check your API key and restrictions.";
        console.error(error);
      }
    }

    loadSeries();
  </script>
</body>
</html>
