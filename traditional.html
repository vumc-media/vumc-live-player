<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traditional Worship | VUMC</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .container {
      max-width: 1500px;
      margin: 0 auto;
      padding: 28px 28px 34px;
    }

    .eyebrow {
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: rgba(255,255,255,0.72);
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 52px;
      line-height: 1.1;
    }

    .subtext {
      font-size: 24px;
      color: rgba(255,255,255,0.84);
      margin-bottom: 28px;
    }

    .status-box {
      margin-bottom: 22px;
      padding: 16px 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      font-size: 20px;
      color: rgba(255,255,255,0.86);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }

    .card {
      display: block;
      text-decoration: none;
      color: #fff;
      background: #111;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .thumb-wrap {
      position: relative;
      aspect-ratio: 16 / 9;
      background: #000;
    }

    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(179,0,0,0.95);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      padding: 7px 11px;
      border-radius: 999px;
      letter-spacing: 0.4px;
    }

    .card-content {
      padding: 14px 14px 16px;
    }

    .card-title {
      font-size: 22px;
      line-height: 1.3;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .card-meta {
      font-size: 17px;
      color: rgba(255,255,255,0.76);
    }

    .note {
      margin-top: 30px;
      text-align: center;
      font-size: 18px;
      color: rgba(255,255,255,0.70);
    }

    .message {
      font-size: 22px;
      padding: 24px;
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
    }

    @media (max-width: 1200px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 800px) {
      .container { padding: 18px 18px 26px; }
      h1 { font-size: 40px; }
      .subtext { font-size: 20px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="eyebrow">Versailles United Methodist Church</div>
    <h1>Traditional Worship</h1>
    <div class="subtext">Past services and upcoming Traditional livestreams</div>

    <div id="statusBox" class="status-box">Loading Traditional Worship...</div>
    <div id="grid" class="grid"></div>

    <div class="note">Select a service to watch. Press BACK to return to the channel.</div>
  </div>

  <script>
    const API_KEY = "AIzaSyCxjuHkcGO-pr1lRIEK8AUOt6RkJKQjpEA";
    const PLAYLIST_ID = "PLD_PrR9HqVpnPmDBpEx0CEQ4B29Kk1HbE";
    const MAX_RESULTS = 18;
    const WATCH_PAGE = "watch.html";

    const grid = document.getElementById("grid");
    const statusBox = document.getElementById("statusBox");

    async function fetchJson(url) {
      const response = await fetch(url);
      if (!response.ok) throw new Error("API request failed");
      return await response.json();
    }

    async function fetchPlaylistItems() {
      const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&maxResults=${MAX_RESULTS}&playlistId=${PLAYLIST_ID}&key=${API_KEY}`;
      return await fetchJson(url);
    }

    async function fetchVideoDetails(videoIds) {
      const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,liveStreamingDetails,status&id=${videoIds.join(",")}&key=${API_KEY}`;
      return await fetchJson(url);
    }

    function getThumb(snippet) {
      return (
        snippet?.thumbnails?.maxres?.url ||
        snippet?.thumbnails?.standard?.url ||
        snippet?.thumbnails?.high?.url ||
        snippet?.thumbnails?.medium?.url ||
        snippet?.thumbnails?.default?.url ||
        ""
      );
    }

    function formatDate(dateString) {
      if (!dateString) return "";
      const date = new Date(dateString);
      return date.toLocaleDateString("en-US", {
        month: "long",
        day: "numeric",
        year: "numeric"
      });
    }

    function formatEastern(dateString) {
      if (!dateString) return "";
      const d = new Date(dateString);
      return d.toLocaleString("en-US", {
        timeZone: "America/New_York",
        weekday: "short",
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      }) + " ET";
    }

    function getBadge(video) {
      const state = video?.snippet?.liveBroadcastContent;
      if (state === "live") return "LIVE";
      if (state === "upcoming") return "UPCOMING";
      return "";
    }

    function getMeta(video) {
      const state = video?.snippet?.liveBroadcastContent;
      if (state === "live") return "Streaming now";
      if (state === "upcoming") {
        const start = video?.liveStreamingDetails?.scheduledStartTime;
        return start ? `Streaming ${formatEastern(start)}` : "Upcoming livestream";
      }
      return formatDate(video?.snippet?.publishedAt) || "Previous service";
    }

    function sortVideos(videos) {
      return videos.sort((a, b) => {
        const rank = (video) => {
          const state = video?.snippet?.liveBroadcastContent;
          if (state === "live") return 0;
          if (state === "upcoming") return 1;
          return 2;
        };

        const rankDiff = rank(a) - rank(b);
        if (rankDiff !== 0) return rankDiff;

        const aDate = a?.liveStreamingDetails?.scheduledStartTime || a?.snippet?.publishedAt || "";
        const bDate = b?.liveStreamingDetails?.scheduledStartTime || b?.snippet?.publishedAt || "";

        return new Date(bDate) - new Date(aDate);
      });
    }

    function buildCard(video) {
      const videoId = video.id;
      const title = video.snippet.title;
      const thumb = getThumb(video.snippet);
      const badge = getBadge(video);
      const meta = getMeta(video);

      const link = document.createElement("a");
      link.className = "card";
      link.href = `${WATCH_PAGE}?v=${encodeURIComponent(videoId)}&title=${encodeURIComponent(title)}`;

      link.innerHTML = `
        <div class="thumb-wrap">
          <img src="${thumb}" alt="${title}">
          ${badge ? `<div class="badge">${badge}</div>` : ""}
        </div>
        <div class="card-content">
          <div class="card-title">${title}</div>
          <div class="card-meta">${meta}</div>
        </div>
      `;

      return link;
    }

    async function loadTraditional() {
      try {
        const playlistData = await fetchPlaylistItems();
        const items = playlistData.items || [];

        if (!items.length) {
          statusBox.textContent = "No videos found in this playlist.";
          return;
        }

        const ids = items
          .map(item => item?.contentDetails?.videoId)
          .filter(Boolean);

        const videoData = await fetchVideoDetails(ids);
        const videos = sortVideos(videoData.items || []);

        grid.innerHTML = "";
        videos.forEach(video => {
          grid.appendChild(buildCard(video));
        });

        statusBox.textContent = "Choose a service to watch.";
      } catch (error) {
        statusBox.innerHTML = `Unable to load Traditional Worship right now. Check your API key and restrictions.`;
        console.error(error);
      }
    }

    loadTraditional();
  </script>
</body>
</html>
